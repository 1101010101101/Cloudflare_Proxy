name: Build and test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: python -m pip install -r requirements.txt

      - name: Run backend tests
        run: python -m unittest discover -v

      - name: Build lightweight single EXE
        shell: pwsh
        run: ./build-lite.ps1

      - name: Upload EXE
        uses: actions/upload-artifact@v7
        with:
          name: CloudflareProxy-win-x64
          path: dist-lite/CloudflareProxy.exe
          if-no-files-found: error
